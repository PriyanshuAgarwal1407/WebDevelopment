<!-- ========================================================= -->
<!-- HTML METADATA (Meta Tags) -->
<!-- ========================================================= -->

<!--
Metadata provides information about the webpage.

It is placed inside the <head> element and is NOT visible to users on the webpage.

Metadata helps:
    • Browsers
    • Search Engines (SEO)
    • Social Media
    • Mobile Devices
    • Accessibility
-->

<!DOCTYPE html>
<html lang="en">

<head>

    <!-- ===================================================== -->
    <!-- Character Encoding -->
    <!-- ===================================================== -->

    <meta charset="UTF-8">

    <!-- ===================================================== -->
    <!-- Responsive Viewport -->
    <!-- ===================================================== -->

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <!-- ===================================================== -->
    <!-- SEO Description -->
    <!-- ===================================================== -->

    <meta
        name="description"
        content="Complete HTML5 Course for Beginners to Advanced (2026 Edition).">

    <!-- ===================================================== -->
    <!-- Keywords (Historical) -->
    <!-- ===================================================== -->

    <meta
        name="keywords"
        content="HTML, CSS, JavaScript, Web Development">

    <!-- ===================================================== -->
    <!-- Author -->
    <!-- ===================================================== -->

    <meta
        name="author"
        content="Your Name">

    <!-- ===================================================== -->
    <!-- Search Engine Robots -->
    <!-- ===================================================== -->

    <meta
        name="robots"
        content="index, follow">

    <!-- ===================================================== -->
    <!-- Browser Theme Color -->
    <!-- ===================================================== -->

    <meta
        name="theme-color"
        content="#2563eb">

    <!-- ===================================================== -->
    <!-- Light/Dark Color Scheme -->
    <!-- ===================================================== -->

    <meta
        name="color-scheme"
        content="light dark">

    <!-- ===================================================== -->
    <!-- Auto Refresh / Redirect -->
    <!-- ===================================================== -->

    <meta
        http-equiv="refresh"
        content="30">

    <!-- Redirect after 5 seconds -->
    <!--
    <meta
        http-equiv="refresh"
        content="5; url=https://example.com">
    -->

    <!-- ===================================================== -->
    <!-- Open Graph (Facebook, LinkedIn, Discord, WhatsApp) -->
    <!-- ===================================================== -->

    <meta property="og:title" content="Complete HTML Course">

    <meta property="og:description"
        content="Learn HTML from Beginner to Advanced.">

    <meta property="og:image"
        content="thumbnail.png">

    <meta property="og:url"
        content="https://example.com">

    <meta property="og:type"
        content="website">

    <!-- ===================================================== -->
    <!-- Twitter Cards -->
    <!-- ===================================================== -->

    <meta
        name="twitter:card"
        content="summary_large_image">

    <meta
        name="twitter:title"
        content="Complete HTML Course">

    <meta
        name="twitter:description"
        content="Learn Modern HTML5.">

    <meta
        name="twitter:image"
        content="thumbnail.png">

    <title>HTML Metadata</title>

</head>

<body>

</body>

</html>

<!-- ========================================================= -->
<!-- 1. charset -->
<!-- ========================================================= -->

<!--
Syntax:

<meta charset="UTF-8">

Purpose:

Defines the character encoding of the document.

Benefits:

✔ Supports all major languages
✔ Supports emojis 😀
✔ Prevents corrupted characters

Best Practice:

Always place it as the first <meta> tag.
-->

<!-- ========================================================= -->
<!-- 2. viewport -->
<!-- ========================================================= -->

<!--
Syntax:

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

Purpose:

Controls how a webpage is displayed on mobile devices.

Meaning:

width=device-width
→ Match the device width.

initial-scale=1.0
→ Initial zoom level.

Without viewport:

❌ Website appears zoomed out on mobile.

With viewport:

✔ Responsive layout.
-->

<!-- ========================================================= -->
<!-- 3. description -->
<!-- ========================================================= -->

<!--
Syntax:

<meta
    name="description"
    content="Learn HTML from beginner to advanced.">

Purpose:

Provides a short summary of the webpage.

Benefits:

✔ SEO
✔ Search engine snippets
✔ Higher click-through rate

Recommended Length:

120–160 characters.
-->

<!-- ========================================================= -->
<!-- 4. keywords (Historical) -->
<!-- ========================================================= -->

<!--
Syntax:

<meta
    name="keywords"
    content="HTML, CSS, JavaScript">

Purpose:

Originally helped search engines understand page topics.

Current Status:

❌ Ignored by Google.
✔ Some small search engines may still use it.

Modern SEO relies on quality content instead.
-->

<!-- ========================================================= -->
<!-- 5. author -->
<!-- ========================================================= -->

<!--
Syntax:

<meta
    name="author"
    content="John Doe">

Purpose:

Specifies the author of the webpage.

Useful for:

✔ Documentation
✔ Blogs
✔ Personal websites
-->

<!-- ========================================================= -->
<!-- 6. robots -->
<!-- ========================================================= -->

<!--
Syntax:

<meta
    name="robots"
    content="index, follow">

Purpose:

Controls how search engines crawl and index a webpage.

Common Values:

index
→ Allow indexing.

noindex
→ Do not index page.

follow
→ Follow links.

nofollow
→ Ignore links.

Examples:

index, follow

noindex, nofollow

Best Practice:

Use "index, follow" for public pages.
-->

<!-- ========================================================= -->
<!-- 7. theme-color -->
<!-- ========================================================= -->

<!--
Syntax:

<meta
    name="theme-color"
    content="#2563eb">

Purpose:

Changes the browser toolbar color
(mainly on mobile browsers).

Useful for:

✔ PWAs
✔ Mobile experience
✔ Brand identity
-->

<!-- ========================================================= -->
<!-- 8. color-scheme -->
<!-- ========================================================= -->

<!--
Syntax:

<meta
    name="color-scheme"
    content="light dark">

Purpose:

Tells the browser your website supports
light mode and dark mode.

Possible Values:

light

dark

light dark
-->

<!-- ========================================================= -->
<!-- 9. refresh -->
<!-- ========================================================= -->

<!--
Syntax:

<meta
    http-equiv="refresh"
    content="30">

Refresh page every 30 seconds.

Redirect Example:

<meta
    http-equiv="refresh"
    content="5; url=https://example.com">

Redirect after 5 seconds.

Use Carefully:

❌ Bad for user experience if overused.
-->

<!-- ========================================================= -->
<!-- 10. Open Graph -->
<!-- ========================================================= -->

<!--
Purpose:

Controls how webpages appear when shared on social media.

Supported By:

✔ Facebook
✔ LinkedIn
✔ Discord
✔ WhatsApp
✔ Slack

Important Properties:

og:title

og:description

og:image

og:url

og:type

Without Open Graph:

Random preview.

With Open Graph:

Professional preview card.
-->

<!-- ========================================================= -->
<!-- 11. Twitter Cards -->
<!-- ========================================================= -->

<!--
Purpose:

Controls how webpages appear when shared on X (Twitter).

Common Tags:

twitter:card

twitter:title

twitter:description

twitter:image

Card Types:

summary

summary_large_image

player

app

Most websites use:

summary_large_image
-->

<!-- ========================================================= -->
<!-- Interview Questions -->
<!-- ========================================================= -->

<!--
Q1. What is metadata in HTML?
Ans: Information about the webpage that is stored inside the <head> element and is not displayed to users.

Q2. Which meta tag defines character encoding?
Ans: <meta charset="UTF-8">

Q3. Why is the viewport meta tag important?
Ans: It makes webpages responsive on different screen sizes, especially mobile devices.

Q4. Which meta tag improves SEO by providing a page summary?
Ans: <meta name="description">

Q5. Is the keywords meta tag still used by Google?
Ans: No. Google ignores the keywords meta tag.

Q6. What does the robots meta tag do?
Ans: It tells search engines whether to index the page and follow its links.

Q7. What is the purpose of theme-color?
Ans: It changes the browser's UI color on supported mobile browsers.

Q8. Why is color-scheme used?
Ans: It informs the browser that the website supports light mode, dark mode, or both.

Q9. What does http-equiv="refresh" do?
Ans: It refreshes the page or redirects users after a specified time.

Q10. What is Open Graph?
Ans: A protocol that controls how webpages appear when shared on platforms like Facebook, LinkedIn, WhatsApp, and Discord.

Q11. What are Twitter Cards?
Ans: Metadata that controls how webpages are displayed when shared on X (Twitter).

Q12. Where should meta tags be placed?
Ans: Inside the <head> element.
-->

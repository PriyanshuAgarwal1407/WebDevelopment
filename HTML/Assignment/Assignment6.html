<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Tables</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Urbanist:wght@300;400;600;700;800;900&display=swap");
      html {
        font-family: "jost", sans-serif;
        background-color: #efefef;
      }
      h1 {
        font-weight: bold;
      }

      table {
        text-align: center;
        border: 1px solid #000;
        border-collapse: collapse;
      }
      tr,
      td,
      th {
        border: 3px solid #000;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Student Result Report 2026</h1>
    <table>
      <colgroup>
        <col style="width: 10%;" />
        <col style="width: 25%;" />
        <col style="width: 25%;" />
        <col style="width: 20%;" />
        <col style="width: 20%;" />
      </colgroup>

      <caption>
        Student Result Report 2026
      </caption>
      <tbody>
        <thead>
          <tr>
            <th scope="col">Roll No</th>
            <th scope="col">Name</th>
            <th scope="col">Course</th>
            <th scope="col">Marks</th>
            <th scope="col">Grade</th>
          </tr>
        </thead>

        <tr>
          <td>101</td>
          <td>Priyanshu</td>
          <td rowspan="2">B.Tech CSE</td>
          <td>95</td>
          <td>A+</td>
        </tr>

        <tr>
          <td>102</td>
          <td>Rahul</td>
          <td>91</td>
          <td>A</td>
        </tr>

        <tr>
          <td>103</td>
          <td colspan="2">Ananya (Lateral Entry)</td>
          <td>88</td>
          <td>B+</td>
        </tr>

        <tr>
          <td>104</td>
          <td>Riya</td>
          <td>BCA</td>
          <td>97</td>
          <td>A+</td>
        </tr>
      </tbody>

      <tfoot>
        <tr>
          <th colspan="3" scope="row">Average Marks</th>
          <td>92.75</td>
          <td>Excellent</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>

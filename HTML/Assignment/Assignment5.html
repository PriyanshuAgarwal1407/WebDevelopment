<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Images</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Urbanist:wght@300;400;600;700;800;900&display=swap");
      html {
        font-family: "jost", sans-serif;
        font-weight: bold;
        background-color: #efefef;
        /* color: #fff; */
      }
      img {
        /* max-width: 250px; */
        box-shadow: rgba(100, 100, 111, 0.2) 0px 7px 29px 0px;
        border-radius: 8px;
      }
    </style>
</head>
<body>
    <!-- Basic Image -->
    <img
        src="../assets/nature.jpg"
        alt="Nature Image"
        width="450"
        height="250"
        title="Nature Image"
    />
    <hr>

    <!-- Image with Link -->
    <a href="https://google.com" target="_blank">
        <img
            src="../assets/ocean.jpg"
            alt="Ocean Image"
            width="450"
            height="250"
            title="Ocean Image"
        />
    </a>

    <hr><br>

    <!-- Lazy Loading -->
    <img
        src="../assets/forest.jpg"
        alt="Forest Image"
        width="450"
        height="250"
        title="Forest Image"
        loading="lazy"
    />
    <hr><br>

    <!-- Async Decoding -->
    <img
        src="../assets/water.jpg"
        alt="Water Image"
        width="450"
        height="250"
        title="Water Image"
        decoding="async"
    />
    <hr><br>

    <!-- Responsive Image -->
    <!-- <img
        src="../assets/forest.jpg"
        srcset="
            ../assets/forest.jpg 480w,
            ../assets/forest.jpg 768w,
            ../assets/forest.jpg 1200w"
        sizes="
            (max-width:600px) 100vw,
            (max-width:900px) 50vw,
            33vw"
        alt="Responsive Image">
    <hr><br> -->

    <!-- Clickable Image -->
    <img
      src="../assets/html.png"
      alt="Clickable Image"
      usemap="#map"
      width="250"
      height="150"
    />
    <map name="map">
      <area
        shape="rect"
        coords="0,0,125,150"
        href="https://www.w3schools.com/html/"
        alt="HTML"
      />
      <area
        shape="rect"
        coords="125,0,250,150"
        href="https://www.w3schools.com/css/"
        alt="CSS"
      />
</body>
</html>

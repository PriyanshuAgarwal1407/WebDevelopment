<!-- ========================================================= -->
<!-- VALIDATION ATTRIBUTES -->
<!-- ========================================================= -->

<!--
required: Field must not be empty.
pattern: Regular expression validation. 
    Example: pattern="[A-Za-z]{3,}"
maxlength: Maximum characters.
minlength: Minimum characters.
readonly: Cannot edit. Submitted with form.
disabled: Cannot edit. ✘ Not submitted.
placeholder: Displays hint text. Not a replacement for labels.
autofocus: Automatically focuses the field when the page loads. Use only once per page.
autocomplete: Browser autofill. Values: on, off
    Examples: email, name, username, current-password, new-password
multiple: Allows multiple values. Works with: email, file
novalidate: Disables browser validation. Applied to: <form>
accept: Restricts uploaded file types.
    Examples:
        image/*
        application/pdf
        .pdf,.docx
        video/*
-->

<!-- ========================================================= -->
<!-- FORM SUBMISSION METHODS -->
<!-- ========================================================= -->

<!--
GET

✔ Appends data to URL
✔ Can be bookmarked
✔ Good for search forms
✔ Cached by browsers

✘ Not suitable for passwords
✘ URL length limitation

--------------------------------

POST

✔ Sends data in request body
✔ Better for sensitive data
✔ Login
✔ Registration
✔ Payments
✔ File Upload
✔ Large data

For file uploads:

enctype="multipart/form-data"
-->

<!-- ========================================================= -->
<!-- ACCESSIBILITY -->
<!-- ========================================================= -->

<!--
✔ Always use <label>.
✔ Every input should have a unique id.
✔ Match:

<label for="email">
<input id="email">

✔ Use placeholder only as a hint.
✔ Group related controls using: <fieldset>
✔ Give groups a title using: <legend>
✔ Ensure keyboard navigation works.
✔ Maintain sufficient color contrast.
✔ Show clear validation errors.
✔ Use semantic HTML.
-->

<!-- ========================================================= -->
<!-- BEST PRACTICES (2026) -->
<!-- ========================================================= -->

<!--
✔ Use semantic HTML.
✔ Choose the correct input type.
✔ Use labels for every control.
✔ Validate on both client and server.
✔ Never rely only on client-side validation.
✔ Prefer POST for sensitive data.
✔ Use autocomplete where appropriate.
✔ Restrict uploads using accept.
✔ Keep forms short and simple.
✔ Use meaningful button text.
✔ Display clear validation messages.
✔ Make forms mobile-friendly.
✔ Use required only when necessary.
✔ Minimize mandatory fields.
✔ Preserve user input after validation errors.
✔ Test using keyboard navigation.
✔ Test with screen readers.
-->

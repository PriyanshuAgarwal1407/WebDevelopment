<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Advanced HTML Topics</title>

    <!-- ===================================================== -->
    <!-- Content Security Policy -->
    <!-- ===================================================== -->

    <meta
        http-equiv="Content-Security-Policy"
        content="default-src 'self'">

    <!-- Theme Color -->

    <meta
        name="theme-color"
        content="#2563eb">

    <!-- Progressive Web App Manifest -->

    <link
        rel="manifest"
        href="manifest.json">

</head>
<body>
    <h1>Advanced HTML (2026)</h1>
    <!-- Secure External Link -->
    <a
        href="https://example.com"
        target="_blank"
        rel="noopener noreferrer">
        External Website
    </a>

    <hr>

    <!-- Secure iframe -->

    <iframe
        src="https://example.com"
        sandbox
        loading="lazy"
        title="Example">
    </iframe>

    <hr>

    <!-- Integrity Example -->

    <script
        src="app.js"
        integrity="sha384-xxxxxxxx"
        crossorigin="anonymous">
    </script>
</body>
</html>

<!-- ========================================================= -->
<!-- Content Security Policy (CSP) -->
<!-- ========================================================= -->

<!--

Restricts what resources a page may load.

Example: Content-Security-Policy

default-src 'self'

Benefits:

✔ Prevents XSS
✔ Blocks Untrusted Scripts

-->

<!-- ========================================================= -->
<!-- iframe sandbox -->
<!-- ========================================================= -->

<!--

Restricts iframe capabilities.

Example: <iframe sandbox>
Optional Permissions:

allow-forms
allow-popups
allow-downloads

-->

<!-- ========================================================= -->
<!-- noopener -->
<!-- ========================================================= -->

<!--

Used with: target="_blank"
Prevents the new page from accessing

window.opener
Improves security.

-->

<!-- ========================================================= -->
<!-- noreferrer -->
<!-- ========================================================= -->

<!--

Prevents: Referer Header from being sent.
Usually used with: noopener

-->

<!-- Integrity Attribute -->
<!-- ========================================================= -->

<!-- ========================================================= -->
<!-- Interview Questions -->
<!-- ========================================================= -->

<!--

Q1. What is XSS?
Ans: Cross-Site Scripting is an attack where malicious scripts are injected into webpages.

Q2. What is the purpose of Content Security Policy (CSP)?
Ans: To restrict which resources a webpage can load, reducing the risk of XSS attacks.

Q3. Why should rel="noopener noreferrer" be used with target="_blank"?
Ans: It prevents the new page from accessing window.opener and hides the referring page information.

Q4. What is the integrity attribute?
Ans: It enables Subresource Integrity (SRI), ensuring externally loaded files have not been modified.

Q5. Why is HTTPS important?
Ans: It encrypts communication, improves security, enables many browser APIs, and is a ranking factor for search engines.

Q6. What is localStorage?
Ans: Persistent browser storage that keeps data even after the browser is closed.

Q7. What is the difference between localStorage and sessionStorage?
Ans: localStorage persists across sessions, while sessionStorage is cleared when the browser tab is closed.

Q8. What is a Progressive Web App (PWA)?
Ans: A web application that behaves like a native app using technologies such as a Web App Manifest and Service Workers.

Q9. What is the purpose of a Web App Manifest?
Ans: It defines metadata such as the app name, icons, theme color, and display mode for installable web apps.

Q10. Which browser tool is used to analyze performance, SEO, accessibility, and best practices?
Ans: Lighthouse.

Q11. Which DevTools panel helps analyze network requests?
Ans: The Network Panel.

Q12. Which DevTools feature is used to test responsive layouts?
Ans: The Device Toolbar.

-->

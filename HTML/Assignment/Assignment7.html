<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete HTML5 Form Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
        }
        fieldset {
            margin: 20px 0;
            padding: 15px;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input,
        select,
        textarea,
        button {
            margin-top: 5px;
            padding: 8px;
            width: 100%;
            box-sizing: border-box;
        }
        .inline {
            display: inline-block;
            width: auto;
            margin-right: 15px;
        }
        .progress-row {
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <h1>Complete HTML5 Form</h1>
    <form action="">
        <fieldset>
            <legend>Basic Information</legend>
            <label for="text">Text</label>
            <input
                type="text"
                id="text"
                name="text"
                placeholder="Enter name"
                required
                autofocus
                minlength="3"
                maxlength="30"
            />

            <label for="password">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                required
                minlength="8"
            />

            <label for="email">Email</label>
            <input
                type="email"
                id="email"
                name="email"
                placeholder="abc@example.com"
                multiple
            />   
            
            <label for="number">Number</label>
            <input type="number" id="number" name="number" min="1" max="100" />

            <label for="search">Search</label>
            <input type="search" id="search" name="search" />

            <label for="url">URL</label>
            <input type="url" id="url" name="url" />

            <label for="tel">Telephone</label>
            <input
            type="tel"
            id="tel"
            name="tel"
            pattern="[0-9]{10}"
            placeholder="10 digit number"
            />

            <label for="color">Favorite Color</label>
            <input type="color" id="color" name="color" />

            <label for="range">Range</label>
            <input
            type="range"
            id="range"
            name="range"
            min="0"
            max="100"
            value="50"
            />

            <label>Date</label>
            <input type="date" name="date" />

            <label>Date & Time</label>
            <input type="datetime-local" name="datetime" />

            <label>Month</label>
            <input type="month" name="month" />

            <label>Week</label>
            <input type="week" name="week" />

            <label>Time</label>
            <input type="time" name="time" />

            <input type="hidden" name="userId" value="101" />
        </fieldset>

        <br><br><br>

        <fieldset>
            <legend>Choices</legend>

            <p>Checkbox</p>
            <label class="inline"><input type="checkbox" name="skills" value="HTML" /> HTML</label>
            <label class="inline"><input type="checkbox" name="skills" value="CSS" /> CSS</label>
            <label class="inline"><input type="checkbox" name="skills" value="JS" /> JavaScript</label>

            <p>Radio</p>
            <label class="inline"><input type="radio" name="gender" value="Male" /> Male</label>
            <label class="inline"><input type="radio" name="gender" value="Female" /> Female</label>

            <label for="file">Upload File</label>
            <input
                type="file"
                id="file"
                name="file"
                accept=".pdf,image/*"
                multiple
            />

            <label for="country">Country</label>
            <select id="country" name="country">
                <optgroup label="Asia">
                    <option>India</option>
                    <option>Japan</option>
                </optgroup>
                <optgroup label="Europe">
                    <option>Germany</option>
                    <option>France</option>
                </optgroup>
            </select>

            <label for="browser">Browser</label>
            <input list="browsers" id="browser" name="browser" />
            <datalist id="browsers">
                <option value="Chrome"></option>
                <option value="Firefox"></option>
                <option value="Edge"></option>
                <option value="Safari"></option>
            </datalist>
        </fieldset>


        <br><br><br>

        <fieldset>
            <legend>Additional Details</legend>

            <label for="bio">Textarea</label>
            <textarea
                id="bio"
                name="bio"
                rows="5"
                cols="40"
                placeholder="Write something...">
            </textarea>

            <div class="progress-row">
                <label>Progress</label>
                <progress value="70" max="100"></progress>
            </div>

            <div class="progress-row">
                <label>Meter</label>
                <meter min="0" max="100" value="80">80%</meter>
            </div>

            <label>Output</label>
            <output>Result: 80</output>

            <label>Readonly</label>
            <input type="text" value="Readonly Value" readonly />

            <label>Disabled</label>
            <input type="text" value="Disabled Value" disabled />

        </fieldset>

        <input
            type="image"
            src="https://www.pngitem.com/pimgs/m/206-2069813_file-css-and-html-css-logo-svg-hd.png"
            alt="Image Submit"
            height="20%"
        />

        <br><br>
        
        <input type="submit" value="Submit" />
        <input type="reset" value="Reset" />
        <input type="button" value="Button" />

        <button type="submit">Button Submit</button>
        <button type="reset">Button Reset</button>
        <button type="button">Normal Button</button>
    </form>
</body>
</html>
